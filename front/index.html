<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/ico" href="favicon.ico">
    
    <link rel="stylesheet" type="text/css" href="sheets/index.css">
    <link rel="stylesheet" type="text/css" href="sysapps/lib/css/tooltips.css">
    <link rel="stylesheet" type="text/css" href="sheets/notification.css">
    <link rel="stylesheet" type="text/css" href="sheets/dock.css">
    <link rel="stylesheet" type="text/css" href="sheets/taskmgr.css">
    <link rel="stylesheet" type="text/css" href="sheets/deskpad.css">
</head>

<body>
    <!-- Above document elements -->
    <div id="noti-container">
        <div id="noti-default" class="tip-top tooltip-delayed-support-button">
            <span class="tooltip">
                Click or tap this notification to dismiss it
            </span>
            <span id="noti-default-icon-error"><span>!</span></span>
            <span id="noti-default-icon-warning"><span>!</span></span>
            <span id="noti-default-icon-info"><span>i</span></span>
            <span id="noti-default-message">Test</span>
        </div>
        <div id="noti-progress" class="tip-top tooltip-delayed-support-button">
            <span class="tooltip">
                Click or tap this notification to collapse it
            </span>
            <span id="noti-progress-message">Moving app data for Store</span>
            <span id="noti-progress-percentile">0%</span>
            <div id="noti-progress-bar"></div>
        </div>
        <div id="noti-progress-collapsed" class="tip-top tooltip-delayed-support-button">
            <span class="tooltip">
                Click or tap this notification to expand it
            </span>
            <div id="noti-progress-collapsed-bar"></div>
        </div>
    </div>
    
    <!-- Loading Screen -->
    <div id="load">
        <div class="middle">
            <h3 class="title">Nivix Studio</h3>
            <div class="loader"></div>
            <div class="footer">
                <span id="load-footer-version">vX.X.X</span>
            </div>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div id="deskpad"></div>
    
    <!-- Dock -->
    
    <div id="dock">
        <div class="left">
            <button id="dock-taskMgrBtn"><span>Task Manager</span></button>
            <button id="prefsButton"><span>Settings</span></button>
        </div>
        <div id="dockContent"></div>
        <div class="right">
            <button id="dock-fullscreenBtn"><span>Fullscreen</span></button>
            <button id="dock-notificationBtn"><span>Notifications</span></button>
            <button id="dock-restartBtn"><span>Reload</span></button>
            <button id="dock-exitBtn"><span>Exit</span></button>
        </div>
    </div>
    
    <!-- Scripts -->
    <script defer src="sysapps/lib/js/jQuery.js"></script>
    <script defer src="sysapps/lib/js/easejs.js"></script>
    <script defer src="sysapps/lib/js/assetLoader.js"></script>
    <script defer src="sysapps/lib/js/tooltips.js"></script>
    <script defer src="sysapps/lib/js/colorlib.js"></script>
    
    <script defer src="modules/ndutil.js"></script>
    <script defer src="modules/util.js"></script>
    <script defer src="modules/noti.js"></script>
    
    <script defer src="modules/prefs.js"></script>
    
    <script defer src="modules/convert.js"></script>
    
    <script defer src="modules/appmgr.js"></script>
    <script defer src="modules/taskmgr.js"></script>
    <script defer src="modules/dock.js"></script>
    <script defer src="modules/deskpad.js"></script>
    
    <script defer src="modules/index.js"></script>
</body>

</html>
