<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivix Volt</title>
    <link rel="stylesheet" type="text/css" href="sheets/index.css">
    <link rel="stylesheet" type="text/css" href="sheets/tabs.css">
    
    <link rel="stylesheet" type="text/css" href="sheets/load/load.css">
    <link rel="stylesheet" type="text/css" href="sheets/dashboard/dashboard.css">
    <link rel="stylesheet" type="text/css" href="sheets/newproject/newproject.css">
</head>
<body>
    <div id="load">
        <div class="middle">
            <img class="load-icon" src="sheets/load/icon.png">
            <h1 class="load-title"><span class="nivixLogoAccent">NiViX </span>Volt<sup aria-label="trademark">&trade;</sup></h1>
            <div class="load-loader"></div>
        </div>
        <div class="footer">
            <span>Volt </span><span id="load-footer-version">vX.X.X</span><span> | &copy; 2026 Nivix Technology. All rights reserved.</span>
        </div>
    </div>
    <div id="dashboard" class="tab">
        <div class="halfpane">
            <div class="left" data-min="0.3">
                <h3 class="bookmark right">Get Started</h3>
                <div class="dashboard-getstarted-section">
                    <button id="dashboard-getstarted-new">New Project</button>
                    <button id="dashboard-getstarted-import">Add Existing Project</button>
                </div>
                <div class="dashboard-getstarted-section">
                    <a target="_blank" href="https://www.nivixtech.com/studio">Nivix Studio</a>
                </div>
                <div class="dashboard-getstarted-section">
                    <button id="dashboard-getstarted-settings">Settings</button>
                    <button id="dashboard-getstarted-quit">Quit</button>
                </div>
            </div>
            <div class="divider"></div>
            <div class="right">
                <h3 class="bookmark">Recents</h3>
                <div class="middle">
                    <div class="load-loader"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="newProject1" class="tab">
        <div class="halfpane">
            <div class="left">
                <h3 class="bookmark" id="newProject1-creationHeader">Create New Project</h3>
                <h3 class="bookmark hidden" id="newProject1-editingHeader">Manage Templates</h3>
                <div class="section" id="newProject1-templateList">
                    <button class="selected">Default</button>
                </div>
                <div class="section bottom" id="newProject1-creationActions">
                    <button id="newProject1-manageTemplates">Manage Templates</button>
                    <button id="newProject1-cancel">Cancel</button>
                </div>
                <div class="section bottom hidden" id="newProject1-editingActions">
                    <button id="newProject1-editingBack">Back</button>
                </div>
            </div>
            <div class="divider"></div>
            <div class="right">
                <div class="newProject1-template" id="newProject1-template-default">
                    <div class="newProject1-template-options">
                        <label for="newProject1-template-default-example">Example: </label>
                        <input type="checkbox" id="newProject1-template-default-example">
                    </div>
                    <div id="newProject1-template-creationActions" class="newProject1-template-actions hidden">
                        <button disabled>Create</button>
                    </div>
                    <div id="newProject1-template-editingActions" class="newProject1-template-actions hidden">
                        <button id="project1-template-delete" disabled>Delete</button>
                        <button id="project1-template-save" disabled>Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="modules/index.js"></script>
</body>
</html>
